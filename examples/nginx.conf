# Example nginx configuration for topornot behind Authelia forward auth.
#
# Prerequisites:
#   - Authelia running and reachable at http://authelia:9091
#   - topornot bound to 127.0.0.1:3000 (the default)
#
# Adapt server_name, upstream addresses, and TLS settings to your environment.

server {
    listen 443 ssl http2;
    server_name topornot.example.com;

    # --- TLS (replace with your cert paths) ---
    ssl_certificate     /etc/nginx/certs/topornot.crt;
    ssl_certificate_key /etc/nginx/certs/topornot.key;

    # --- Authelia forward-auth endpoint ---
    location /authelia {
        internal;
        proxy_pass http://authelia:9091/api/verify;

        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        # Forward the original request details so Authelia can make a decision
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-URI   $request_uri;
        proxy_set_header X-Forwarded-For   $remote_addr;
    }

    # --- Application ---
    location / {
        # Strip any client-supplied identity headers (defense in depth)
        proxy_set_header Remote-User   "";
        proxy_set_header Remote-Groups "";
        proxy_set_header Remote-Email  "";
        proxy_set_header Remote-Name   "";

        # Ask Authelia to authenticate
        auth_request /authelia;

        # Copy identity headers from Authelia's response into the upstream request
        auth_request_set $auth_user   $upstream_http_remote_user;
        auth_request_set $auth_groups $upstream_http_remote_groups;
        auth_request_set $auth_email  $upstream_http_remote_email;
        auth_request_set $auth_name   $upstream_http_remote_name;

        proxy_set_header Remote-User   $auth_user;
        proxy_set_header Remote-Groups $auth_groups;
        proxy_set_header Remote-Email  $auth_email;
        proxy_set_header Remote-Name   $auth_name;

        proxy_pass http://127.0.0.1:3000;
    }
}
