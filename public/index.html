<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="Approval queue for agent suggestions" />
  <title>topornot</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>topornot</h1>
    <div class="header-actions">
      <button class="btn-header-help" id="btn-header-help" aria-label="Help" aria-keyshortcuts="?" title="Help (?)">
        <span aria-hidden="true">ⓘ</span>
        <kbd aria-hidden="true">?</kbd>
      </button>
      <button class="btn-header-refresh" id="btn-header-refresh" aria-label="Refresh" aria-keyshortcuts="R" title="Refresh (R)">
        <span class="refresh-icon" aria-hidden="true">↻</span>
        <kbd aria-hidden="true">R</kbd>
      </button>
      <div class="queue-count" id="queue-count" aria-live="polite" aria-atomic="true">0 pending</div>
    </div>
  </header>

  <main class="app-main">
    <div class="card-stack" id="card-stack">
      <div class="loading" id="loading-state" role="status" hidden>
        <div class="loading-card">
          <div class="card-header">
            <div class="skeleton skeleton-agent"></div>
            <div class="skeleton skeleton-time"></div>
          </div>
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text" style="width: 90%"></div>
          <div class="skeleton skeleton-text" style="width: 60%"></div>
          <div class="skeleton-footer">
            <div class="skeleton skeleton-pos"></div>
          </div>
        </div>
      </div>
      <div class="empty-state" id="empty-state" hidden>
        <div class="empty-icon" aria-hidden="true">✓</div>
        <p>All caught up!</p>
        <p class="empty-sub">No pending suggestions.</p>
        <button id="btn-refresh" class="btn btn-refresh" aria-label="Refresh" aria-keyshortcuts="R">
          <span class="refresh-icon" aria-hidden="true">↻</span>
          <span>Check for updates <kbd aria-hidden="true">R</kbd></span>
        </button>
      </div>

      <article class="card" id="current-card" aria-labelledby="card-title" aria-describedby="card-description" hidden>
        <div class="card-progress" id="card-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-label="Queue progress"></div>
        <div class="swipe-hint swipe-hint-right" id="hint-approve" aria-hidden="true">APPROVE</div>
        <div class="swipe-hint swipe-hint-left" id="hint-reject" aria-hidden="true">REJECT</div>
        <div class="swipe-hint swipe-hint-top" id="hint-defer" aria-hidden="true">DEFER</div>
        <div class="card-header">
          <span class="card-agent" id="card-agent"></span>
          <time class="card-time" id="card-time"></time>
        </div>
        <h2 class="card-title" id="card-title" tabindex="-1"></h2>
        <p class="card-description" id="card-description"></p>
        <div class="card-context card-context-wrap" id="card-context-wrap">
          <details>
            <summary id="card-context-summary" aria-keyshortcuts="C">Context <kbd aria-hidden="true">C</kbd></summary>
            <pre id="card-context"></pre>
          </details>
        </div>
        <div class="card-position">
          <span id="card-pos"></span>
        </div>
      </article>
    </div>

    <nav class="action-bar" id="action-bar" aria-label="Suggestion actions" hidden>
      <button class="btn btn-reject" id="btn-reject" aria-label="Reject" aria-keyshortcuts="Z" title="Reject (Z)">
        <span class="btn-icon" aria-hidden="true">✗</span>
        <span class="btn-label">Reject <kbd aria-hidden="true">Z</kbd></span>
      </button>
      <button class="btn btn-defer" id="btn-defer" aria-label="Defer" aria-keyshortcuts="D" title="Defer (D)">
        <span class="btn-icon" aria-hidden="true">↩</span>
        <span class="btn-label">Defer <kbd aria-hidden="true">D</kbd></span>
      </button>
      <button class="btn btn-approve" id="btn-approve" aria-label="Approve" aria-keyshortcuts="A" title="Approve (A)">
        <span class="btn-icon" aria-hidden="true">✓</span>
        <span class="btn-label">Approve <kbd aria-hidden="true">A</kbd></span>
      </button>
      <button class="btn btn-copy" id="btn-copy" aria-label="Copy" aria-keyshortcuts="S" title="Copy (S)">
        <span class="btn-icon" aria-hidden="true">📋</span>
        <span class="btn-label">Copy <kbd aria-hidden="true">S</kbd></span>
      </button>
    </nav>
  </main>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>
